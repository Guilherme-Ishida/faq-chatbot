<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot da Kira</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css" integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU" crossorigin="anonymous">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>

    <div class="chat-wrapper">
        <div class="chat-container">

            <div class="chat-header">
                <div class="header-info">
                    <div class="avatar-container">
                        <img src="{{ url_for('static', filename='eu_distorcida.jpeg') }}" class="header-avatar" alt="Kira">
                        <span class="status-dot"></span>
                    </div>
                    <div class="header-text">
                        <h3>Chatbot da Kira ✨</h3>
                        <p>Me pergunte qualquer coisa (porém depende)!</p>
                    </div>
                </div>
            </div>

            <div id="messageArea" class="chat-messages">
                <div class="welcome-message">
                    <img src="{{ url_for('static', filename='gato_serio.webp') }}" class="welcome-cat" alt="Gato">
                    <p>Olá! Sou o assistente gatonildo da Kira. Como posso te ajudar hoje? 🐱</p>
                </div>
            </div>

            <div class="chat-footer">
                <form id="messageForm" class="input-area">
                    <input type="text" id="text" name="msg" placeholder="Digite sua mensagem..." autocomplete="off" required/>
                    <button type="submit" id="send">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>

        </div>
    </div>

    <script>
        const botImgUrl = "{{ url_for('static', filename='gato_serio.webp') }}";
        const userImgUrl = "{{ url_for('static', filename='eu_distorcida.jpeg') }}";

        $(document).ready(function() {
            $("#messageForm").on("submit", function(event) {
                event.preventDefault();

                const date = new Date();
                const str_time = date.getHours() + ":" + String(date.getMinutes()).padStart(2, '0');
                const rawText = $("#text").val().trim();

                if (!rawText) return;

                const userHtml = `
                    <div class="message user-message">
                        <div class="message-content">
                            <div class="bubble">${rawText}</div>
                            <span class="time">${str_time}</span>
                        </div>
                        <img src="${userImgUrl}" class="msg-avatar" alt="Você">
                    </div>`;

                $("#text").val("");
                $("#messageArea").append(userHtml);
                scrollToBottom();

                const typingHtml = `
                    <div class="message bot-message" id="typing">
                        <img src="${botImgUrl}" class="msg-avatar" alt="Bot">
                        <div class="message-content">
                            <div class="bubble typing-bubble">
                                <span></span><span></span><span></span>
                            </div>
                        </div>
                    </div>`;
                $("#messageArea").append(typingHtml);
                scrollToBottom();

                $.ajax({
                    data: { msg: rawText },
                    type: "POST",
                    url: "/get",
                }).done(function(data) {
                    $("#typing").remove();
                    const botHtml = `
                        <div class="message bot-message">
                            <img src="${botImgUrl}" class="msg-avatar" alt="Bot">
                            <div class="message-content">
                                <div class="bubble">${data}</div>
                                <span class="time">${str_time}</span>
                            </div>
                        </div>`;
                    $("#messageArea").append(botHtml);
                    scrollToBottom();
                });
            });

            function scrollToBottom() {
                const area = document.getElementById("messageArea");
                area.scrollTop = area.scrollHeight;
            }
        });
    </script>

</body>
</html>
