<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login — Assistente Virtual UTFPR</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;

            background:
                linear-gradient(
                    135deg,
                    #667eea 0%,
                    #764ba2 100%
                );

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 20px;
        }

        .login-container {

            width: 100%;
            max-width: 430px;

            background: white;

            border-radius: 24px;

            overflow: hidden;

            box-shadow:
                0 20px 60px rgba(0,0,0,0.25);

            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {

            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {

            background:
                linear-gradient(
                    135deg,
                    #667eea 0%,
                    #764ba2 100%
                );

            color: white;

            padding: 40px 30px;

            text-align: center;
        }

        .logo-circle {

            width: 90px;
            height: 90px;

            margin: 0 auto 20px;

            border-radius: 50%;

            background: rgba(255,255,255,0.15);

            display: flex;
            justify-content: center;
            align-items: center;

            backdrop-filter: blur(10px);
        }

        .logo-circle i {
            font-size: 40px;
        }

        .login-header h1 {

            font-size: 28px;
            font-weight: 700;

            margin-bottom: 8px;
        }

        .login-header p {

            opacity: 0.9;
            font-size: 14px;
        }

        .login-body {
            padding: 35px;
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {

            display: block;

            margin-bottom: 8px;

            font-size: 14px;
            font-weight: 600;

            color: #333;
        }

        .input-wrapper {

            position: relative;
        }

        .input-wrapper i {

            position: absolute;

            left: 15px;
            top: 50%;

            transform: translateY(-50%);

            color: #999;
        }

        .input-wrapper input {

            width: 100%;

            padding:
                14px
                14px
                14px
                45px;

            border: 2px solid #e5e7eb;

            border-radius: 12px;

            font-size: 15px;

            transition: all 0.3s ease;

            outline: none;
        }

        .input-wrapper input:focus {

            border-color: #667eea;

            box-shadow:
                0 0 0 4px rgba(102,126,234,0.15);
        }

        .btn-login {

            width: 100%;

            border: none;

            padding: 15px;

            border-radius: 12px;

            background:
                linear-gradient(
                    135deg,
                    #667eea 0%,
                    #764ba2 100%
                );

            color: white;

            font-size: 15px;
            font-weight: 600;

            cursor: pointer;

            transition: all 0.3s ease;
        }

        .btn-login:hover {

            transform: translateY(-2px);

            box-shadow:
                0 10px 20px rgba(102,126,234,0.3);
        }

        .btn-login i {
            margin-right: 8px;
        }

        .alert {

            padding: 14px;

            border-radius: 10px;

            margin-bottom: 20px;

            font-size: 14px;
            font-weight: 500;
        }

        .alert-danger {

            background: #fdecea;

            color: #b42318;

            border: 1px solid #f5c2c0;
        }

        .alert-warning {

            background: #fff4e5;

            color: #b54708;

            border: 1px solid #f7d7a7;
        }

        .alert-success {

            background: #ecfdf3;

            color: #027a48;

            border: 1px solid #a6f4c5;
        }

        .footer-text {

            margin-top: 24px;

            text-align: center;

            font-size: 13px;

            color: #777;
        }

    </style>
</head>

<body>

<div class="login-container">

    <div class="login-header">

        <div class="logo-circle">
            <i class="fas fa-robot"></i>
        </div>

        <h1>Assistente Virtual UTFPR</h1>

        <p>
            Faça login para acessar o sistema
        </p>

    </div>

    <div class="login-body">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">

            <div class="input-group">

                <label for="username">
                    Usuário
                </label>

                <div class="input-wrapper">

                    <i class="fas fa-user"></i>

                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Digite seu usuário"
                        required
                        autofocus
                    >

                </div>

            </div>

            <div class="input-group">

                <label for="password">
                    Senha
                </label>

                <div class="input-wrapper">

                    <i class="fas fa-lock"></i>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Digite sua senha"
                        required
                    >

                </div>

            </div>

            <button type="submit" class="btn-login">

                <i class="fas fa-sign-in-alt"></i>

                Entrar

            </button>

        </form>

        <div class="footer-text">
            UTFPR • Sistema de Atendimento Inteligente
        </div>

    </div>

</div>

</body>
</html>
